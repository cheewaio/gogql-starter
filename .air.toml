# Minimal air config: build binary into build/app and run it
root = "."
tmp_dir = "build"

[build]
  cmd = "go build -gcflags \"all=-N -l\" -o build/app ./cmd"
  bin = "build/run.sh"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["build", "vendor"]
  delay = 1000

[log]
  time = true
